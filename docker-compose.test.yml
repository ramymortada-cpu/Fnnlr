# Postgres for the live-DB test suite (Sprint 32).
#
#   docker compose -f docker-compose.test.yml up -d
#   export CONTROL_PLANE_DATABASE_URL="postgresql://postgres:postgres@localhost:5544/fnnlr_control"
#   export TENANT_DB_ADMIN_URL="postgresql://postgres:postgres@localhost:5544/postgres"
#   export TENANT_DB_HOST=localhost TENANT_DB_PORT=5544
#   export TENANT_CREDENTIAL_ENCRYPTION_KEY=test-key-32-bytes-aaaaaaaaaaaaaa
#   export INTEGRATION_ENCRYPTION_KEY=test-key-32-bytes-bbbbbbbbbbbbbb
#   export FNNLR_CRON_SECRET=test-cron-secret
#   createdb -h localhost -p 5544 -U postgres fnnlr_control   # or: psql ... -c 'CREATE DATABASE fnnlr_control'
#   npm run migrate:control
#   npm run test:pg
#
# The admin role needs CREATEDB + CREATEROLE so provisionTenant can create a
# dedicated database per tenant (that is the isolation boundary).

services:
  fnnlr-test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5544:5432"
    command: ["postgres", "-c", "max_connections=200"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
