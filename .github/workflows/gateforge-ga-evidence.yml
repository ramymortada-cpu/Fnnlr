name: GateForge GA Evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  ga-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and safety CI
        run: npm run ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Generate SBOM
        run: npm run sbom:generate
      - name: GateForge external evidence validator smoke
        run: npm run gateforge:external-smoke
      - name: GateForge final gate evaluator smoke
        run: npm run gateforge:final-gate-smoke
      - name: GateForge attestation secret pack smoke
        run: npm run gateforge:attestation-secret-pack-smoke
      - name: GateForge hosted secrets manifest smoke
        run: npm run gateforge:hosted-secrets-manifest-smoke
      - name: GateForge hosted secrets preflight smoke
        run: npm run gateforge:hosted-secrets-preflight-smoke
      - name: GateForge scaffold local secrets smoke
        run: npm run gateforge:scaffold-local-secrets-smoke
      - name: GateForge local secret files check smoke
        run: npm run gateforge:local-secret-files-check-smoke
      - name: GateForge secret replacement packet smoke
        run: npm run gateforge:secret-replacement-packet-smoke
      - name: GateForge scaffold ephemeral local secret files
        run: npm run gateforge:scaffold-local-secrets
      - name: GateForge secret replacement packet
        run: |
          npm run gateforge:secret-replacement-packet || echo "::notice title=GateForge secret replacement remains blocked::Local placeholder secret files were converted into a sanitized replacement packet; real staging values are still required."
      - name: GateForge secret replacement packet freshness check
        run: npm run gateforge:secret-replacement-packet-check
      - name: GateForge secret upload attempt evidence
        run: npm run gateforge:upload-local-secrets -- --dry-run || true
      - name: GateForge secret upload attempt freshness check
        run: npm run gateforge:upload-local-secrets-check
      - name: GateForge local secrets env template smoke
        run: npm run gateforge:local-secrets-env-template-smoke
      - name: GateForge import local secrets smoke
        run: npm run gateforge:import-local-secrets-smoke
      - name: GateForge write local secret smoke
        run: npm run gateforge:write-local-secret-smoke
      - name: GateForge upload local secrets smoke
        run: npm run gateforge:upload-local-secrets-smoke
      - name: GateForge hosted unblock runner smoke
        run: npm run gateforge:hosted-unblock-smoke
      - name: GateForge GA unblock status smoke
        run: npm run gateforge:ga-unblock-status-smoke
      - name: GateForge GA evidence run audit smoke
        run: npm run gateforge:ga-evidence-run-audit-smoke
      - name: GateForge current-head GA proof smoke
        run: npm run gateforge:current-head-ga-proof-smoke
      - name: GateForge hosted readiness doctor smoke
        run: npm run gateforge:hosted-readiness-doctor-smoke
      - name: GateForge external blocker progress smoke
        run: npm run gateforge:external-blocker-progress-smoke
      - name: GateForge operator execution packet smoke
        run: npm run gateforge:operator-execution-packet-smoke
      - name: GateForge hosted operator drift smoke
        run: npm run gateforge:hosted-operator-drift-smoke
      - name: GateForge GitHub secrets audit smoke
        run: npm run gateforge:github-secrets-audit-smoke
      - name: GateForge GitHub secrets B64-only audit smoke
        run: npm run gateforge:github-secrets-audit-b64-smoke
      - name: GateForge GitHub secrets remediation check
        run: npm run gateforge:github-secrets-remediation-check
      - name: GateForge hosted strict trigger smoke
        run: npm run gateforge:trigger-hosted-strict-smoke
      - name: GateForge hosted strict trigger readiness smoke
        run: npm run gateforge:hosted-strict-trigger-readiness-smoke
      - name: SaaS moat action plan check
        run: npm run moat:check
      - name: SaaS moat status consistency smoke
        run: npm run moat:status-consistency-smoke
      - name: SaaS moat execution status
        run: npm run moat:status
      - name: SaaS moat owner queue check
        run: npm run moat:owner-queue-check
      - name: GateForge remaining external blocker closeout
        run: npm run gateforge:remaining-blockers-closeout -- --check
      - name: GateForge external blocker progress
        run: npm run gateforge:external-blocker-progress
        continue-on-error: true
      - name: GateForge external blocker progress freshness check
        run: npm run gateforge:external-blocker-progress-check
      - name: GateForge operator execution packet
        run: npm run gateforge:operator-execution-packet
        continue-on-error: true
      - name: GateForge operator execution packet freshness check
        run: npm run gateforge:operator-execution-packet-check
      - name: GateForge external closeout validator smoke
        run: npm run gateforge:external-closeout-validator-smoke
      - name: GateForge hosted dependency chain smoke
        run: npm run gateforge:hosted-dependency-chain-smoke
      - name: GateForge hosted readiness contract smoke
        run: npm run gateforge:hosted-readiness-contract-smoke
      - name: GateForge open P0 runbook smoke
        run: npm run gateforge:open-p0-runbook-smoke
      - name: GateForge GA unblock evidence
        run: |
          npm run gateforge:ga-unblock || echo "::notice title=GateForge GA evidence remains blocked::Local evidence artifact generation completed with CANNOT_APPROVE because hosted staging/runtime evidence is still missing."
      - name: GateForge war room
        run: npm run gateforge:war-room
        if: always()
      - name: GateForge war room freshness check
        run: npm run gateforge:war-room-check
        if: always()
      - name: GateForge hosted setup guide
        run: npm run gateforge:hosted-setup-guide
        if: always()
      - name: GateForge hosted setup guide freshness check
        run: npm run gateforge:hosted-setup-guide-check
        if: always()
      - name: GateForge life-or-death plan
        run: npm run gateforge:life-or-death-plan
        if: always()
      - name: GateForge life-or-death plan check
        run: npm run gateforge:life-or-death-plan-check
        if: always()
      - name: GateForge final decision report
        run: npm run gateforge:final-report
        if: always()
      - name: GateForge final decision report freshness check
        run: npm run gateforge:final-report-check
        if: always()
      - name: GateForge GA evidence run audit
        run: npm run gateforge:ga-evidence-run-audit -- --allow-failures
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge GA evidence run audit freshness check
        run: npm run gateforge:ga-evidence-run-audit-check -- --allow-failures
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge external closeout validator
        run: npm run gateforge:external-closeout-validator -- --allow-failures
        if: always()
      - name: GateForge external closeout validator freshness check
        run: npm run gateforge:external-closeout-validator-check
        if: always()
      - name: GateForge hosted dependency chain
        run: npm run gateforge:hosted-dependency-chain
        if: always()
      - name: GateForge hosted dependency chain freshness check
        run: npm run gateforge:hosted-dependency-chain-check
        if: always()
      - name: GateForge hosted readiness contract
        run: npm run gateforge:hosted-readiness-contract
        if: always()
      - name: GateForge hosted readiness contract freshness check
        run: npm run gateforge:hosted-readiness-contract-check
        if: always()
      - name: GateForge open P0 runbook
        run: npm run gateforge:open-p0-runbook
        if: always()
      - name: GateForge open P0 runbook freshness check
        run: npm run gateforge:open-p0-runbook-check
        if: always()
      - name: GateForge hosted strict trigger readiness
        run: npm run gateforge:hosted-strict-trigger-readiness -- --allow-not-ready
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge hosted strict trigger readiness freshness check
        run: npm run gateforge:hosted-strict-trigger-readiness-check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge current-head GA proof
        run: npm run gateforge:current-head-ga-proof -- --allow-not-ready
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge current-head GA proof freshness check
        run: npm run gateforge:current-head-ga-proof-check
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
      - name: GateForge CI artifact index smoke
        run: npm run gateforge:ci-artifact-index-smoke
        if: always()
      - name: Upload sanitized evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gateforge-ga-evidence
          path: |
            gateforge-audit/evidence/sbom.json
            docs/SAAS_MOAT_ACTION_PLAN.md
            docs/SAAS_MOAT_ACTION_PLAN.csv
            docs/SAAS_MOAT_EXECUTION_STATUS.md
            docs/SAAS_MOAT_EXECUTION_STATUS.json
            gateforge-audit/GA_UNBLOCK_WAR_ROOM.md
            gateforge-audit/run-*/10_final_gate_report.md
            gateforge-audit/run-*/11_implementation_plan.md
            gateforge-audit/run-*/24_ga_unblock_evidence_pack.md
            gateforge-audit/run-*/25_live_command_results.md
            gateforge-audit/run-*/26_remaining_blockers.md
            gateforge-audit/run-*/27_recomputed_score.md
            gateforge-audit/run-*/28_conditional_go_request.md
            gateforge-audit/run-*/29_disposable_staging_evidence.md
            gateforge-audit/run-*/30_disposable_staging_repeatable_run.md
            gateforge-audit/run-*/31_external_attestation_closeout.md
            gateforge-audit/run-*/32_external_evidence_intake.md
            gateforge-audit/run-*/33_final_gate_evaluator.md
            gateforge-audit/run-*/34_final_gate_current_decision.md
            gateforge-audit/run-*/35_ci_artifact_index.md
            gateforge-audit/run-*/36_life_or_death_war_room.md
            gateforge-audit/run-*/38_hosted_staging_operator_setup.md
            gateforge-audit/run-*/39_github_secrets_presence_audit.md
            gateforge-audit/run-*/39_github_secrets_presence_audit.json
            gateforge-audit/run-*/40_missing_github_secrets_remediation.md
            gateforge-audit/run-*/40_missing_github_secrets_remediation.json
            gateforge-audit/run-*/41_hosted_strict_trigger_attempt.md
            gateforge-audit/run-*/41_hosted_strict_trigger_attempt.json
            gateforge-audit/run-*/42_life_or_death_execution_plan.md
            gateforge-audit/run-*/42_life_or_death_secret_collection.csv
            gateforge-audit/run-*/43_operator_secret_command_pack.md
            gateforge-audit/run-*/44_hosted_readiness_doctor.md
            gateforge-audit/run-*/44_hosted_readiness_doctor.json
            gateforge-audit/run-*/45_secret_replacement_packet.md
            gateforge-audit/run-*/45_secret_replacement_packet.csv
            gateforge-audit/run-*/45_secret_replacement_packet.json
            gateforge-audit/run-*/46_attestation_secret_pack.md
            gateforge-audit/run-*/46_attestation_secret_pack.json
            gateforge-audit/run-*/49_local_secret_env_template.env
            gateforge-audit/run-*/49_local_secret_env_template.md
            gateforge-audit/run-*/47_ga_unblock_status.md
            gateforge-audit/run-*/47_ga_unblock_status.json
            gateforge-audit/run-*/48_remaining_external_blocker_closeout.md
            gateforge-audit/run-*/48_remaining_external_blocker_closeout.json
            gateforge-audit/run-*/49_external_blocker_progress.md
            gateforge-audit/run-*/49_external_blocker_progress.json
            gateforge-audit/run-*/50_operator_execution_packet.md
            gateforge-audit/run-*/50_operator_execution_packet.csv
            gateforge-audit/run-*/50_operator_execution_packet.json
            gateforge-audit/run-*/51_ga_evidence_run_audit.md
            gateforge-audit/run-*/51_ga_evidence_run_audit.json
            gateforge-audit/run-*/52_external_closeout_validator.md
            gateforge-audit/run-*/52_external_closeout_validator.json
            gateforge-audit/run-*/53_hosted_dependency_chain.md
            gateforge-audit/run-*/53_hosted_dependency_chain.json
            gateforge-audit/run-*/54_hosted_readiness_contract.md
            gateforge-audit/run-*/54_hosted_readiness_contract.json
            gateforge-audit/run-*/55_open_p0_terminal_runbook.md
            gateforge-audit/run-*/55_open_p0_terminal_runbook.json
            gateforge-audit/run-*/56_hosted_strict_trigger_readiness.md
            gateforge-audit/run-*/56_hosted_strict_trigger_readiness.json
            gateforge-audit/run-*/57_secret_upload_attempt.md
            gateforge-audit/run-*/57_secret_upload_attempt.json
            gateforge-audit/run-*/58_current_head_ga_evidence_proof.md
            gateforge-audit/run-*/58_current_head_ga_evidence_proof.json
            gateforge-audit/external-attestations/HOSTED_STAGING_WAR_ROOM.md
            gateforge-audit/external-attestations/*.md
            gateforge-audit/external-attestations/*.json
            gateforge-audit/run-*/ga-unblock-evidence/*.log
            gateforge-audit/run-*/ga-unblock-evidence/summary.json
          if-no-files-found: ignore
